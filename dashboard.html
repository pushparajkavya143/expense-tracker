<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-container" style="max-width: 800px;">
        <h2>Welcome to Expense Tracker Dashboard</h2>
        
        <div class="actions" style="flex-direction: row; justify-content: space-between; margin-bottom: 20px;">
            <a href="{{ url_for('add_transaction') }}" class="btn" style="margin-top:0; max-width: 200px;">Add New Transaction</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger" style="margin-top:0; max-width: 100px;">Logout</a>
        </div>

        <h3>Your Transactions</h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left;">
            <thead>
                <tr style="background-color: #3498db; color: white;">
                    <th style="padding: 12px; border: 1px solid #ddd;">Title</th>
                    <th style="padding: 12px; border: 1px solid #ddd;">Amount</th>
                    <th style="padding: 12px; border: 1px solid #ddd;">Type</th>
                </tr>
            </thead>
            <tbody>
                {% for transaction in transactions %}
                <tr style="background-color: {% if transaction.type == 'income' %}#e8f8f5{% else %}#fdedec{% endif %};">
                    <td style="padding: 12px; border: 1px solid #ddd;">{{ transaction.title }}</td>
                    <td style="padding: 12px; border: 1px solid #ddd;">₹{{ transaction.amount }}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; color: {% if transaction.type == 'income' %}#27ae60{% else %}#c0392b{% endif %};">{{ transaction.type | uppercase }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" style="padding: 12px; text-align: center; color: #777;">No transactions found. Add one above!</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
